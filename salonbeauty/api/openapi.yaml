openapi: 3.0.3
info:
  title: Beauty Salon Network API
  version: 1.0.0
  description: |
    REST API для записи клиентов, расписания, каталога и оплат (MVP портфолио).
servers:
  - url: http://localhost:8000/v1
    description: Local MVP
paths:
  /signups:
    get:
      summary: Список записей
      operationId: listSignups
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - name: salon_id
          in: query
          schema:
            type: integer
        - name: from
          in: query
          description: Начало периода (ISO 8601)
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupListResponse'
    post:
      summary: Создать запись
      operationId: createSignup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSignupRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Signup'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /signups/{signupId}:
    patch:
      summary: Обновить запись (статус)
      operationId: patchSignup
      parameters:
        - $ref: '#/components/parameters/SignupId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchSignupRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Signup'
        '404':
          $ref: '#/components/responses/NotFound'
  /masters/{masterId}/schedule:
    get:
      summary: Расписание мастера
      operationId: getMasterSchedule
      parameters:
        - name: masterId
          in: path
          required: true
          schema:
            type: integer
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Signup'
        '404':
          $ref: '#/components/responses/NotFound'
  /payments:
    post:
      summary: Создать оплату
      operationId: createPayment
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      summary: Список оплат (демо)
      operationId: listPayments
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentListResponse'
  /payments/{paymentId}:
    get:
      summary: Получить оплату
      operationId: getPayment
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '404':
          $ref: '#/components/responses/NotFound'
  /catalog/services:
    get:
      summary: Каталог услуг
      operationId: listServices
      parameters:
        - name: salon_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Service'
  /promotions/active:
    get:
      summary: Активные акции на дату
      operationId: listActivePromotions
      parameters:
        - name: on
          in: query
          description: Дата (YYYY-MM-DD), по умолчанию сегодня
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Promotion'

components:
  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        maximum: 100
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
    SignupId:
      name: signupId
      in: path
      required: true
      schema:
        type: integer
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
    Signup:
      type: object
      properties:
        id:
          type: integer
        master_slot_id:
          type: integer
        user_id:
          type: integer
        slot_start_at:
          type: string
          format: date-time
        slot_end_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [draft, confirmed, paid, completed, cancelled, no_show]
    CreateSignupRequest:
      type: object
      required:
        - master_slot_id
        - user_id
      properties:
        master_slot_id:
          type: integer
        user_id:
          type: integer
    PatchSignupRequest:
      type: object
      properties:
        status:
          type: string
          enum: [draft, confirmed, paid, completed, cancelled, no_show]
    SignupListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Signup'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    Payment:
      type: object
      properties:
        id:
          type: integer
        sum_payment:
          type: string
        sum_prepayment:
          type: string
          nullable: true
        date_payment:
          type: string
          format: date-time
        type_payment_id:
          type: integer
          nullable: true
        signup_id:
          type: integer
    CreatePaymentRequest:
      type: object
      required:
        - signup_id
        - sum_payment
      properties:
        signup_id:
          type: integer
        sum_payment:
          type: string
        sum_prepayment:
          type: string
        type_payment_id:
          type: integer
    PaymentListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Payment'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    Service:
      type: object
      properties:
        id:
          type: integer
        name_service:
          type: string
        price:
          type: integer
        type_service_id:
          type: integer
    Promotion:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        date_start:
          type: string
          format: date
        date_end:
          type: string
          format: date
        service_ids:
          type: array
          items:
            type: integer
